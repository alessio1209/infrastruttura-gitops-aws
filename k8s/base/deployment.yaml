apiVersion: apps/v1
kind: Deployment
metadata: 
  name: iot-dashboard-deployment
  labels:
    app: iot-dashboard

spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-dashboard
  template:
    metadata:
      labels:
        app: iot-dashboard
    spec:
      nodeSelector:
        kubernetes.io/hostname: debian2
      containers:
      - name: iot-dashboard
        image: alessioerco12/iot-dashboard:latest
        ports:
        - containerPort: 8000
